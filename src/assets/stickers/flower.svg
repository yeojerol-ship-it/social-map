<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- 5 petals — darker back layer for depth -->
  <ellipse cx="32" cy="16" rx="7.5" ry="11" fill="#F06292" stroke="white" stroke-width="3" transform="rotate(0 32 32)"/>
  <ellipse cx="32" cy="16" rx="7.5" ry="11" fill="#F06292" stroke="white" stroke-width="3" transform="rotate(72 32 32)"/>
  <ellipse cx="32" cy="16" rx="7.5" ry="11" fill="#F06292" stroke="white" stroke-width="3" transform="rotate(144 32 32)"/>
  <ellipse cx="32" cy="16" rx="7.5" ry="11" fill="#F06292" stroke="white" stroke-width="3" transform="rotate(216 32 32)"/>
  <ellipse cx="32" cy="16" rx="7.5" ry="11" fill="#F06292" stroke="white" stroke-width="3" transform="rotate(288 32 32)"/>
  <!-- petal vein highlights — one per petal direction -->
  <line x1="32" y1="22" x2="32" y2="7"  stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="32" y2="7"  stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round" transform="rotate(72 32 32)"/>
  <line x1="32" y1="22" x2="32" y2="7"  stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round" transform="rotate(144 32 32)"/>
  <line x1="32" y1="22" x2="32" y2="7"  stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round" transform="rotate(216 32 32)"/>
  <line x1="32" y1="22" x2="32" y2="7"  stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round" transform="rotate(288 32 32)"/>
  <!-- yellow center disc -->
  <circle cx="32" cy="32" r="12" fill="#FFD54F" stroke="white" stroke-width="3"/>
  <!-- center texture ring -->
  <circle cx="32" cy="32" r="8" fill="#FFA000" opacity="0.55"/>
  <!-- pollen dots -->
  <circle cx="28" cy="29" r="1.8" fill="#5D4037" opacity="0.5"/>
  <circle cx="35" cy="28" r="1.6" fill="#5D4037" opacity="0.5"/>
  <circle cx="37" cy="35" r="1.5" fill="#5D4037" opacity="0.5"/>
  <circle cx="30" cy="37" r="1.6" fill="#5D4037" opacity="0.5"/>
  <!-- center shine -->
  <ellipse cx="29" cy="29" rx="4" ry="2.5" fill="white" opacity="0.3" transform="rotate(-20 29 29)"/>
</svg>
