        paint-order="stroke fill" filter="url(#moonShadow)"/>

  <!-- Moon crescent body -->
  <path d="M88 18 C58 18 32 42 32 72 C32 102 56 126 88 126 C99 126 109 122 117 116 C105 120 84 116 72 101 C59 86 58 66 64 50 C70 34 83 23 98 20 C95 19 92 18 88 18 Z"
