  <!-- Small floating star dots (no outline) -->
  <circle cx="122" cy="38" r="5" fill="white" opacity="0.9"/>
  <circle cx="132" cy="65" r="3.5" fill="white" opacity="0.75"/>
  <circle cx="116" cy="24" r="3" fill="white" opacity="0.8"/>
