<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <radialGradient id="moonGrad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="40%" stop-color="#ffd94a"/>
      <stop offset="100%" stop-color="#c97b00"/>
    </radialGradient>
    <radialGradient id="moonAO" cx="72%" cy="68%" r="50%">
      <stop offset="0%" stop-color="#7a4800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7a4800" stop-opacity="0"/>
    </radialGradient>
    <filter id="moonShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#8a5500" flood-opacity="0.5"/>
