        fill="#A0300A" opacity="0.25" transform="translate(1,1)"/>
  <!-- main leaf -->
  <path d="M32 8 L36 18 L46 13 L43 23 L55 23 L47 31 L53 41 L41 37 L37 51 L32 43 L27 51 L23 37 L11 41 L17 31 L9 23 L21 23 L18 13 L28 18 Z"
        fill="#E8430A" stroke="white" stroke-width="3" stroke-linejoin="round"/>
