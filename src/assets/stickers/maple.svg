  <line x1="32" y1="28" x2="17" y2="31"  stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="28" x2="47" y2="31"  stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="22" x2="21" y2="23"  stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
  <line x1="32" y1="22" x2="43" y2="23"  stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
  <!-- stem -->
  <line x1="32" y1="50" x2="32" y2="57"  stroke="#E8430A" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="57"  stroke="white"   stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
