<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <radialGradient id="cloudGradL" cx="35%" cy="30%" r="70%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dff0ff"/>
      <stop offset="100%" stop-color="#aed4f0"/>
    </radialGradient>
    <radialGradient id="cloudGradR" cx="38%" cy="30%" r="70%" fx="38%" fy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dff0ff"/>
      <stop offset="100%" stop-color="#aed4f0"/>
    </radialGradient>
    <filter id="cloudDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3a6e9c" flood-opacity="0.35"/>
    </filter>
    <filter id="rainbowGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000033" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Rainbow arcs — drawn bottom-up (outermost to innermost) -->
  <path d="M14 118 Q14 28 80 28 Q146 28 146 118"
        fill="none" stroke="#ff3b30" stroke-width="13" stroke-linecap="round" filter="url(#rainbowGlow)"/>
  <path d="M22 118 Q22 40 80 40 Q138 40 138 118"
        fill="none" stroke="#ff9500" stroke-width="13" stroke-linecap="round"/>
  <path d="M30 118 Q30 52 80 52 Q130 52 130 118"
        fill="none" stroke="#ffcc00" stroke-width="13" stroke-linecap="round"/>
  <path d="M38 118 Q38 64 80 64 Q122 64 122 118"
        fill="none" stroke="#34c759" stroke-width="13" stroke-linecap="round"/>
  <path d="M46 118 Q46 76 80 76 Q114 76 114 118"
        fill="none" stroke="#007aff" stroke-width="13" stroke-linecap="round"/>
  <path d="M54 118 Q54 88 80 88 Q106 88 106 118"
        fill="none" stroke="#af52de" stroke-width="13" stroke-linecap="round"/>

  <!-- Specular gloss stripe over arcs -->
  <path d="M26 80 Q52 32 80 30 Q110 28 132 68"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.32"/>

  <!-- Left cloud cluster -->
  <circle cx="18" cy="116" r="18" fill="white" stroke="white" stroke-width="14"
          paint-order="stroke fill" filter="url(#cloudDrop)"/>
  <circle cx="32" cy="106" r="20" fill="white" stroke="white" stroke-width="14"
          paint-order="stroke fill" filter="url(#cloudDrop)"/>
  <circle cx="18" cy="116" r="18" fill="url(#cloudGradL)"/>
  <circle cx="32" cy="106" r="20" fill="url(#cloudGradL)"/>
  <ellipse cx="24" cy="100" rx="10" ry="6" fill="white" opacity="0.7"/>

  <!-- Right cloud cluster -->
  <circle cx="142" cy="116" r="18" fill="white" stroke="white" stroke-width="14"
          paint-order="stroke fill" filter="url(#cloudDrop)"/>
  <circle cx="128" cy="106" r="20" fill="white" stroke="white" stroke-width="14"
          paint-order="stroke fill" filter="url(#cloudDrop)"/>
  <circle cx="142" cy="116" r="18" fill="url(#cloudGradR)"/>
  <circle cx="128" cy="106" r="20" fill="url(#cloudGradR)"/>
  <ellipse cx="122" cy="100" rx="10" ry="6" fill="white" opacity="0.7"/>
</svg>
