<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- boot shaft -->
  <path d="M14 44 L14 20 Q14 13 21 13 L30 13 Q34 13 34 18 L34 30 L46 30 Q54 30 54 38 L54 44 Z"
        fill="#7B4F2E" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- sole -->
  <rect x="12" y="43" width="44" height="7" rx="3.5" fill="#2D1F14" stroke="white" stroke-width="3"/>
  <!-- sole tread lines -->
  <line x1="18" y1="47" x2="50" y2="47" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- lace panel -->
  <rect x="16" y="15" width="15" height="16" rx="2" fill="#9B6A3E" stroke="white" stroke-width="2"/>
  <!-- laces -->
  <line x1="17" y1="19" x2="30" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="23" x2="30" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="27" x2="30" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- lace eyelets -->
  <circle cx="18" cy="19" r="1.2" fill="#5A3A1A"/>
  <circle cx="29" cy="19" r="1.2" fill="#5A3A1A"/>
  <circle cx="18" cy="23" r="1.2" fill="#5A3A1A"/>
  <circle cx="29" cy="23" r="1.2" fill="#5A3A1A"/>
  <!-- toe cap highlight -->
  <path d="M36 32 Q50 31 52 37" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
