<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <!-- Large Z gradient -->
    <radialGradient id="z1Grad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <!-- Medium Z gradient -->
    <radialGradient id="z2Grad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <!-- Small Z gradient -->
    <radialGradient id="z3Grad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="45%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="zDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#2e1065" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Large Z — white outline then colored fill -->
  <text x="10" y="120" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="88" fill="white" stroke="white" stroke-width="16" stroke-linejoin="round"
        paint-order="stroke fill">Z</text>
  <text x="10" y="120" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="88" fill="url(#z1Grad)" filter="url(#zDrop)">Z</text>

  <!-- Medium Z -->
  <text x="54" y="86" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="58" fill="white" stroke="white" stroke-width="13" stroke-linejoin="round"
        paint-order="stroke fill">Z</text>
  <text x="54" y="86" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="58" fill="url(#z2Grad)" filter="url(#zDrop)">Z</text>

  <!-- Small Z -->
  <text x="90" y="60" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="38" fill="white" stroke="white" stroke-width="12" stroke-linejoin="round"
        paint-order="stroke fill">Z</text>
  <text x="90" y="60" font-family="Arial Black, Helvetica Neue, sans-serif" font-weight="900"
        font-size="38" fill="url(#z3Grad)" filter="url(#zDrop)">Z</text>
</svg>
