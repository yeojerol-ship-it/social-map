<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- fry sticks above carton -->
  <!-- back row -->
  <rect x="20" y="6"  width="6" height="26" rx="3" fill="#FFD54F" stroke="white" stroke-width="2.5"/>
  <rect x="29" y="4"  width="6" height="28" rx="3" fill="#FFCA28" stroke="white" stroke-width="2.5"/>
  <rect x="38" y="7"  width="6" height="25" rx="3" fill="#FFD54F" stroke="white" stroke-width="2.5"/>
  <!-- front row -->
  <rect x="15" y="10" width="6" height="22" rx="3" fill="#FFB300" stroke="white" stroke-width="2.5"/>
  <rect x="43" y="10" width="6" height="22" rx="3" fill="#FFB300" stroke="white" stroke-width="2.5"/>
  <!-- shadow under carton top -->
  <rect x="10" y="30" width="44" height="4" rx="0" fill="#C0392B" opacity="0.3"/>
  <!-- carton body — red -->
  <path d="M12 30 L10 58 L54 58 L52 30 Z" fill="#E53935" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- carton top flap -->
  <path d="M12 30 L16 24 L48 24 L52 30 Z" fill="#C62828" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- golden arches logo on carton -->
  <path d="M22 40 Q22 47 27 47 Q27 42 32 42 Q37 42 37 47 Q42 47 42 40" fill="none" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
  <!-- carton side highlight -->
