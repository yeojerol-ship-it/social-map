<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- cone shadow -->
  <path d="M9 57 L37 27 L51 41 Z" fill="#BF3A0E" opacity="0.25"/>
  <!-- party popper cone body -->
  <path d="M8 56 L36 26 L50 40 Z" fill="#FF6D3A" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- cone highlight stripe -->
  <path d="M12 52 L34 28 L40 34 Z" fill="#FFAB91" opacity="0.4"/>
  <!-- opening ellipse (mouth) -->
  <ellipse cx="43" cy="33" rx="9.5" ry="6" fill="#FF6D3A" stroke="white" stroke-width="3" transform="rotate(45 43 33)"/>
  <!-- inner opening (dark) -->
  <ellipse cx="43" cy="33" rx="5.5" ry="3.2" fill="#C84A1A" opacity="0.6" transform="rotate(45 43 33)"/>
  <!-- cone band markings -->
  <path d="M14 50 L38 28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M20 53 L40 32" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.2"/>
  <!-- confetti pieces -->
  <rect x="35" y="7"  width="8" height="5.5" rx="2" fill="#FF4081" stroke="white" stroke-width="1.8" transform="rotate(-22 39 9.5)"/>
  <rect x="50" y="15" width="7" height="5"   rx="2" fill="#40C4FF" stroke="white" stroke-width="1.8" transform="rotate(18 53.5 17.5)"/>
  <rect x="25" y="5"  width="6" height="5.5" rx="2" fill="#69F0AE" stroke="white" stroke-width="1.8" transform="rotate(32 28 7.5)"/>
  <rect x="54" y="8"  width="5.5" height="4.5" rx="1.5" fill="#FFCA28" stroke="white" stroke-width="1.5" transform="rotate(-10 56.5 10.5)"/>
  <circle cx="56" cy="28" r="4"   fill="#FFCA28" stroke="white" stroke-width="1.8"/>
  <circle cx="42" cy="6"  r="3.8" fill="#EA80FC" stroke="white" stroke-width="1.8"/>
  <circle cx="28" cy="18" r="3"   fill="#FF4081" stroke="white" stroke-width="1.5"/>
  <!-- curly streamers -->
  <path d="M38 19 Q42 12 49 16 Q54 18 52 24" stroke="#FFD740" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M45 25 Q50 18 55 23 Q58 27 54 32" stroke="#FF80AB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
