<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <radialGradient id="padGrad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#f5c4a2"/>
      <stop offset="45%" stop-color="#e8956a"/>
      <stop offset="100%" stop-color="#b85530"/>
    </radialGradient>
    <radialGradient id="toeGrad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#f8d0b0"/>
      <stop offset="45%" stop-color="#e8a07a"/>
      <stop offset="100%" stop-color="#c06040"/>
    </radialGradient>
    <radialGradient id="padAO" cx="50%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#7a3010" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7a3010" stop-opacity="0"/>
    </radialGradient>
    <filter id="pawShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#7a3010" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Toe beans — white die-cut outlines -->
  <ellipse cx="42" cy="54" rx="17" ry="20" fill="white" stroke="white" stroke-width="13"
           paint-order="stroke fill" filter="url(#pawShadow)"/>
  <ellipse cx="80" cy="42" rx="16" ry="19" fill="white" stroke="white" stroke-width="13"
           paint-order="stroke fill" filter="url(#pawShadow)"/>
  <ellipse cx="118" cy="54" rx="17" ry="20" fill="white" stroke="white" stroke-width="13"
           paint-order="stroke fill" filter="url(#pawShadow)"/>
  <!-- Fourth toe (inner right) -->
  <ellipse cx="98" cy="46" rx="15" ry="18" fill="white" stroke="white" stroke-width="13"
           paint-order="stroke fill" filter="url(#pawShadow)"/>

  <!-- Main pad — white die-cut outline -->
  <ellipse cx="80" cy="108" rx="42" ry="36" fill="white" stroke="white" stroke-width="14"
           paint-order="stroke fill" filter="url(#pawShadow)"/>

  <!-- Toe beans fill -->
  <ellipse cx="42" cy="54" rx="17" ry="20" fill="url(#toeGrad)"/>
  <ellipse cx="80" cy="42" rx="16" ry="19" fill="url(#toeGrad)"/>
  <ellipse cx="118" cy="54" rx="17" ry="20" fill="url(#toeGrad)"/>
  <ellipse cx="98" cy="46" rx="15" ry="18" fill="url(#toeGrad)"/>

  <!-- Main pad fill -->
  <ellipse cx="80" cy="108" rx="42" ry="36" fill="url(#padGrad)"/>

  <!-- Pad inner darker heart shape / depth -->
  <ellipse cx="80" cy="110" rx="27" ry="23" fill="#c05030" opacity="0.45"/>

  <!-- Pad AO bottom -->
  <ellipse cx="80" cy="108" rx="42" ry="36" fill="url(#padAO)"/>

  <!-- Pad depth crease -->
  <path d="M58 108 Q80 100 102 108" stroke="#9a4020" stroke-width="3" fill="none"
        stroke-linecap="round" opacity="0.4"/>

  <!-- Toe specular highlights -->
  <ellipse cx="36" cy="47" rx="7" ry="5" fill="white" opacity="0.55" transform="rotate(-15 36 47)"/>
  <ellipse cx="74" cy="36" rx="7" ry="4.5" fill="white" opacity="0.55" transform="rotate(-5 74 36)"/>
  <ellipse cx="112" cy="47" rx="7" ry="5" fill="white" opacity="0.5" transform="rotate(15 112 47)"/>
  <ellipse cx="93" cy="40" rx="6" ry="4" fill="white" opacity="0.5" transform="rotate(10 93 40)"/>

  <!-- Main pad specular highlight -->
  <ellipse cx="62" cy="92" rx="16" ry="10" fill="white" opacity="0.5" transform="rotate(-20 62 92)"/>
</svg>
