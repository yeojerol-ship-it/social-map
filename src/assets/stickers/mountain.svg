<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- sky wash -->
  <rect x="0" y="0" width="64" height="64" rx="8" fill="#C8DEFA" opacity="0.4"/>
  <!-- back mountain (furthest, palest) -->
  <polygon points="46,18 60,54 32,54" fill="#B8CCE8" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- back mountain snow cap -->
  <polygon points="46,18 52,31 40,31" fill="white" opacity="0.8"/>
  <!-- mid mountain -->
  <polygon points="34,22 52,54 16,54" fill="#7BA7D4" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="34,22 41,36 27,36" fill="white" opacity="0.75"/>
  <!-- front peak (main, darkest) -->
  <polygon points="20,8 48,54 -8,54" fill="#3A6EA8" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- front snow cap -->
  <polygon points="20,8 31,28 9,28" fill="white" opacity="0.95"/>
  <!-- snow shadow edge -->
  <line x1="20" y1="8" x2="27" y2="22" stroke="#B8CEDE" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- foreground ground line -->
  <rect x="-4" y="51" width="72" height="7" fill="#2D5E8E" opacity="0.25"/>
  <!-- pine tree silhouettes at base -->
  <polygon points="10,52 13,42 16,52" fill="#1B4332" opacity="0.5"/>
  <polygon points="4,52 7,44 10,52"  fill="#1B4332" opacity="0.45"/>
</svg>
